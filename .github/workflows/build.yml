name: Build Windows .exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: GrowthPartnerEditTool_desktop
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download FFmpeg
        working-directory: GrowthPartnerEditTool_desktop
        shell: pwsh
        run: |
          curl -L "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -o ffmpeg.zip
          7z x ffmpeg.zip -offmpeg_extracted | Out-Null
          New-Item -ItemType Directory -Force -Path assets | Out-Null
          $ffmpeg = Get-ChildItem -Recurse -Filter "ffmpeg.exe" ffmpeg_extracted | Select-Object -First 1
          $ffprobe = Get-ChildItem -Recurse -Filter "ffprobe.exe" ffmpeg_extracted | Select-Object -First 1
          Copy-Item $ffmpeg.FullName assets\ffmpeg.exe
          Copy-Item $ffprobe.FullName assets\ffprobe.exe
          Write-Host "FFmpeg copied: $(Get-Item assets\ffmpeg.exe)"
          Write-Host "FFprobe copied: $(Get-Item assets\ffprobe.exe)"

      - name: Build .exe
        working-directory: GrowthPartnerEditTool_desktop
        run: pyinstaller build.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GrowthPartnerEditTool-Windows
          path: GrowthPartnerEditTool_desktop/dist/GrowthPartnerEditTool/
          retention-days: 30
